<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Custom Embed Metadata (What people see on Discord, Twitter, Facebook) -->
    <meta property="og:title" content="YOUR CUSTOM TITLE HERE">
    <meta property="og:description" content="YOUR CUSTOM DESCRIPTION HERE">
    <meta property="og:image" content="https://URL-OF-YOUR-PREVIEW-IMAGE.jpg">
    <meta property="og:type" content="website">
    
    <!-- Twitter Specific Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="YOUR CUSTOM TITLE HERE">
    <meta name="twitter:description" content="YOUR CUSTOM DESCRIPTION HERE">
    <meta name="twitter:image" content="https://URL-OF-YOUR-PREVIEW-IMAGE.jpg">

    <!-- Instant Redirect (0 = zero seconds delay) -->
    <meta http-equiv="refresh" content="0; url=https://YOUR-FINAL-DESTINATION-URL.com">
    
    <title>Redirecting...</title>
</head>
<body>
    <p>If you are not redirected automatically, <a href="https://YOUR-FINAL-DESTINATION-URL.com">click here</a>.</p>
</body>
</html>
